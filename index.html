<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>HARD</title>
<link rel="icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C1814">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:oklch(0.967 0.007 85); --paper-2:oklch(0.945 0.009 84); --card:oklch(0.992 0.004 90);
    --ink:oklch(0.235 0.012 70); --ink-2:oklch(0.46 0.012 72); --ink-3:oklch(0.62 0.010 75);
    --line:oklch(0.885 0.008 82); --line-2:oklch(0.83 0.010 80);
    --red:oklch(0.575 0.205 28); --red-ink:oklch(0.47 0.18 28); --red-wash:oklch(0.93 0.045 30);
    --mono:'JetBrains Mono',ui-monospace,monospace; --grot:'Archivo',system-ui,sans-serif;
    --in-bg:oklch(0.99 0.01 60); --bar-bg:var(--ink); --bar-fg:oklch(0.967 0.007 85); --bar-dim:oklch(0.72 0.01 80);
  }
  body[data-theme="dark"]{
    --paper:#0b0c10; --paper-2:#14181f; --card:#1a1f2e;
    --ink:#eaeaea; --ink-2:#9da3af; --ink-3:#6b7280;
    --line:#2a3441; --line-2:#3a4e61;
    --red:#e8543c; --red-ink:#ff7a5c; --red-wash:rgba(232,84,60,.12);
    --in-bg:#1c1512; --bar-bg:#1f2833; --bar-fg:#eaeaea; --bar-dim:#9da3af;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--grot);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
  #app{max-width:520px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;overflow-x:clip;}
  /* header */
  .hd{flex:none;padding:54px 20px 12px;}
  .eye{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:flex;justify-content:space-between;align-items:baseline;}
  .eye .dot{color:var(--red-ink);font-weight:700;}
  .trow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:6px;}
  .ttl{font-family:var(--grot);font-weight:900;font-size:40px;letter-spacing:-.03em;line-height:.9;text-transform:uppercase;overflow-wrap:anywhere;min-width:0;}
  .cnt{text-align:right;line-height:1;}
  .cnt .big{font-weight:900;font-size:34px;letter-spacing:-.02em;line-height:.82;font-variant-numeric:tabular-nums;}
  .cnt .lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);margin-top:5px;}
  .meter{margin-top:14px;display:flex;gap:3px;height:5px;}
  .meter i{flex:1;background:var(--line-2);border-radius:1px;} .meter i.on{background:var(--ink);}
  /* chips */
  .chips{flex:none;display:flex;gap:7px;overflow-x:auto;padding:12px 20px 13px;border-bottom:1px solid var(--line);scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:none;border:1px solid var(--line-2);background:var(--card);border-radius:999px;padding:7px 12px 6px;display:flex;align-items:center;gap:7px;position:relative;cursor:pointer;}
  .chip .nm{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-2);}
  .chip .ct{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .chip.owed::after{content:'';position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--paper);}
  .chip.sel{background:var(--ink);border-color:var(--ink);} .chip.sel .nm{color:var(--paper);} .chip.sel .ct{color:oklch(0.78 0.01 80);}
  /* list */
  .list{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;}
  .row{position:relative;display:flex;align-items:stretch;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);}
  .rb{flex:1;min-width:0;}
  .rtop{display:flex;align-items:baseline;justify-content:space-between;gap:6px 10px;flex-wrap:wrap;}
  .exn{font-family:var(--grot);font-weight:800;font-size:20px;letter-spacing:-.02em;line-height:.98;text-transform:uppercase;overflow-wrap:anywhere;min-width:0;}
  .exn.dim2{color:var(--ink-3);font-weight:600;}
  .goal{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}
  .tags{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px 8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;}
  .tag.pr{color:var(--ink);font-weight:700;} .tag.sc{color:var(--ink-3);font-weight:400;}
  .gbar{flex:none;display:flex;gap:6px;padding:12px 20px 0;}
  .gb{background:none;border:1px solid var(--line-2);border-radius:999px;padding:5px 13px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);cursor:pointer;}
  .gb.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .rm{flex:none;align-self:center;background:none;border:none;color:var(--ink-3);font-size:15px;line-height:1;cursor:pointer;padding:4px 2px;margin-left:0;}
  .addrow{padding:16px 18px;font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--line);background:var(--paper-2);cursor:pointer;}
  /* media thumb */
  .thumb{flex:none;width:78px;align-self:stretch;min-height:66px;border-radius:10px;border:1px solid var(--line);background:repeating-linear-gradient(135deg,var(--paper-2) 0 6px,var(--card) 6px 12px);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .ply{opacity:.4;font-size:13px;color:var(--ink-2);}
  .stars{display:flex;gap:5px;margin-top:10px;}
  .star{font-size:12.5px;line-height:1;color:var(--line-2);cursor:pointer;}
  .star.on{color:var(--red);}
  .add{flex:none;align-self:center;width:27px;height:27px;border-radius:50%;border:1.5px solid var(--ink);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;}
  .row.in{background:var(--in-bg);}
  .row.in::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red);}
  .row.in .add{background:var(--red);border-color:var(--red);color:var(--paper);}
  .row.in .exn{color:var(--red-ink);}
  /* freq control */
  .freq{flex:none;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-3);cursor:pointer;font-variant-numeric:tabular-nums;}
  .freq .seg{display:inline-flex;gap:2px;}
  .freq .seg b{width:6px;height:11px;border-radius:1px;background:var(--line-2);}
  .freq .seg b.done{background:var(--ink);}
  .freq .ev{color:var(--red-ink);font-size:9px;letter-spacing:.08em;}
  /* series */
  .serhd{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);padding:14px 20px 6px;}
  .ghd{display:flex;align-items:baseline;gap:10px;padding:15px 20px 9px;background:var(--paper-2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2;}
  .ghd .gn{font-family:var(--grot);font-weight:900;font-size:14px;letter-spacing:.03em;text-transform:uppercase;}
  .ghd .gc{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .ser{border-bottom:1px solid var(--line);padding-top:15px;padding-bottom:15px;}
  .sthumb{box-shadow:4px 4px 0 -1px var(--paper),4px 4px 0 0 var(--line-2),8px 8px 0 -2px var(--paper),8px 8px 0 -1px var(--line);margin-right:6px;flex-direction:column;gap:2px;}
  .sthumb .ct2{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-2);}
  .ser .sname{font-family:var(--grot);font-weight:800;font-size:20px;letter-spacing:-.02em;text-transform:uppercase;overflow-wrap:anywhere;min-width:0;}
  .ser .smeta{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-top:5px;display:flex;gap:10px;}
  .ser .smeta .ev{color:var(--red-ink);font-weight:700;}
  .ordrow{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line);}
  .ordrow .num{flex:none;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-3);width:18px;text-align:right;}
  .ordrow .exn{flex:1;font-size:17px;}
  .ordrow .mv{flex:none;background:none;border:1px solid var(--line-2);border-radius:7px;color:var(--ink-2);width:30px;height:30px;font-size:14px;cursor:pointer;}
  .evtog{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--line-2);border-radius:999px;padding:7px 13px;cursor:pointer;}
  .evtog.on{background:var(--red);border-color:var(--red);color:var(--paper);font-weight:700;}
  /* session rows */
  .srow{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);}
  .srow .exn{flex:1;}
  .srow .num{flex:none;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-3);width:18px;text-align:right;}
  .done-c{flex:none;width:42px;height:42px;border-radius:50%;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:20px;}
  .srow.done .done-c{background:var(--red);border-color:var(--red);color:var(--paper);}
  .srow.done .exn{color:var(--ink-3);text-decoration:line-through;}
  .shd{display:flex;align-items:center;gap:10px;padding:14px 18px 8px;background:var(--paper-2);border-bottom:1px solid var(--line);}
  .shd .t{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);flex:1;}
  .shd .c{font-family:var(--mono);font-size:10px;color:var(--ink-3);}
  /* bottom bar */
  .bar{flex:none;background:var(--bar-bg);color:var(--bar-fg);padding:14px 18px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:14px;}
  .bar.empty{background:var(--card);color:var(--ink-3);border-top:1px solid var(--line);justify-content:center;}
  .bar .hint{font-family:var(--mono);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);}
  .bi{flex:1;min-width:0;}
  .be{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--bar-dim);}
  .bl{display:flex;align-items:center;gap:9px;margin-top:4px;}
  .bn{font-weight:900;font-size:22px;line-height:1;font-variant-numeric:tabular-nums;}
  .track{flex:1;height:4px;border-radius:2px;background:oklch(0.42 0.01 75);overflow:hidden;} .track i{display:block;height:100%;background:var(--red);}
  .go{flex:none;background:var(--red);color:var(--paper);border:none;border-radius:11px;padding:13px 18px;font-family:var(--grot);font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;}
  .go.ghost{background:transparent;color:var(--ink-3);border:1px solid var(--line);}
  /* complete */
  .complete{flex:1;display:flex;flex-direction:column;padding:60px 24px 24px;overflow-y:auto;min-height:0;}
  .complete .ce{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);}
  .complete .chk{width:54px;height:54px;border-radius:50%;background:var(--red);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:30px;margin:18px 0 10px;}
  .complete h1{font-family:var(--grot);font-weight:900;font-size:52px;letter-spacing:-.03em;margin:0;text-transform:uppercase;}
  .complete .sl{color:var(--ink-2);font-family:var(--mono);font-size:13px;margin:8px 0 22px;}
  .covlist{flex:1;}
  .cov{padding:11px 0;border-bottom:1px solid var(--line);}
  .cov .ct{display:flex;justify-content:space-between;align-items:baseline;}
  .cov .cn{font-family:var(--grot);font-weight:800;font-size:16px;text-transform:uppercase;}
  .cov .cm{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;}
  .cov .cm .ok{color:var(--red-ink);font-weight:700;}
  .cbar{height:7px;border-radius:3px;background:var(--line-2);margin-top:7px;overflow:hidden;display:flex;}
  .cbar .prev{height:100%;background:var(--ink);} .cbar .gain{height:100%;background:var(--red);}
  /* nav */
  .nav{flex:none;display:flex;border-top:1px solid var(--line);background:var(--paper);margin-top:auto;}
  .nav button{flex:1;background:none;border:none;padding:12px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);cursor:pointer;}
  .nav button.on{color:var(--ink);font-weight:700;}
  .empty{color:var(--ink-3);font-family:var(--mono);font-size:13px;padding:40px 20px;text-align:center;}
  .backlnk{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);cursor:pointer;padding:18px 20px 12px;min-height:48px;}
  /* exercise editor */
  .txt{background:var(--card);border:1px solid var(--line-2);color:var(--ink);padding:10px 12px;border-radius:9px;font-size:16px;font-family:var(--grot);font-weight:700;width:100%;outline:none;}
  .efield{padding:14px 20px;border-bottom:1px solid var(--line);}
  .efield .lb{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:9px;}
  .ethumb{width:96px;height:96px;min-height:96px;align-self:auto;border-radius:14px;}
  .mpills{display:flex;flex-wrap:wrap;gap:6px;}
  .mpill{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;text-transform:lowercase;border:1px solid var(--line-2);border-radius:999px;padding:5px 11px;color:var(--ink-3);cursor:pointer;}
  .mpill.p{background:var(--ink);border-color:var(--ink);color:var(--paper);font-weight:700;}
  .mpill.s{background:var(--paper-2);border-color:var(--line-2);color:var(--ink-2);}
  .mreg{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:12px 0 6px;}
  .legendln{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:10px;letter-spacing:.04em;}
  /* color coding */
  .cdot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line-2);display:inline-block;flex:none;cursor:pointer;}
  .cpal{display:flex;gap:12px;flex-wrap:wrap;}
  .cpal .cdot{width:28px;height:28px;}
  .cdot.onsel{outline:2px solid var(--ink);outline-offset:2px;}
  /* exercise detail */
  .dthumb{width:100%;max-width:340px;height:200px;min-height:200px;align-self:auto;border-radius:16px;}
  .dthumb img,.dthumb video{object-fit:cover;}
  .dmeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  /* drag */
  .dh{flex:none;align-self:center;color:var(--ink-3);font-size:14px;padding:6px 5px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;}
  .lift{opacity:.45;background:var(--paper-2);}
  /* tags (trello-style labels) */
  .tline{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
  .tpill{display:inline-block;border-radius:5px;padding:1.5px 8px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--tc,#888);}
  .tpick{display:inline-flex;align-items:center;gap:6px;border-radius:6px;padding:5px 11px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--tc,#888);color:var(--tc,#888);background:none;}
  .tpick.on{background:var(--tc,#888);color:#fff;}
  .tpicks{display:flex;flex-wrap:wrap;gap:7px;}
  /* context menu */
  .ctx{position:fixed;z-index:60;background:var(--card);border:1px solid var(--line-2);border-radius:13px;
    box-shadow:0 16px 36px rgba(30,26,22,.22);padding:12px;min-width:210px;max-width:260px;}
  .ctx .lb{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin:8px 0 6px;}
  .ctx .lb:first-child{margin-top:0;}
  .ctx .cpal{gap:8px;} .ctx .cpal .cdot{width:22px;height:22px;}
  .ctx .fopts{display:flex;gap:5px;flex-wrap:wrap;}
  .ctx .fopt{font-family:var(--mono);font-size:10px;border:1px solid var(--line-2);border-radius:999px;padding:4px 10px;color:var(--ink-2);cursor:pointer;background:none;}
  .ctx .fopt.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .ctx .act{display:block;width:100%;text-align:left;background:none;border:none;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);padding:10px 2px;cursor:pointer;margin-top:2px;}
  .ctx .act.red{color:var(--red-ink);}
  /* focus mode */
  .focus{flex:1;display:flex;flex-direction:column;min-height:0;}
  .fmedia{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:var(--paper-2);border-bottom:1px solid var(--line);overflow:hidden;}
  .fmedia img,.fmedia video{max-width:100%;max-height:100%;object-fit:contain;}
  .fmedia .ply{font-size:42px;opacity:.25;}
  .fname{font-family:var(--grot);font-weight:900;font-size:28px;letter-spacing:-.02em;text-transform:uppercase;line-height:1;padding:16px 20px 4px;overflow-wrap:anywhere;}
  .fmeta{padding:0 20px 14px;display:flex;flex-wrap:wrap;gap:6px;}
  .fdone{flex:none;margin:0 16px calc(16px + env(safe-area-inset-bottom));}
  .fdone .go{width:100%;padding:20px;font-size:19px;border-radius:14px;}
  /* desktop trainer builder */
  body.deskbuild #app{max-width:1400px;}
  .builder{flex:1;display:flex;min-height:0;}
  .builder .pane{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
  .builder .pane:first-child{border-right:2px solid var(--ink);}
  .builder .pane .hd{padding-top:24px;}
  /* account avatar */
  .avatar{position:fixed;top:14px;right:14px;z-index:30;width:38px;height:38px;border-radius:50%;
    background:var(--ink);color:var(--paper);font-family:var(--mono);font-weight:700;font-size:14px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid var(--line-2);
    box-shadow:0 2px 10px rgba(0,0,0,.15);}
  .eye{padding-right:46px;}
  /* ===== TRAINER STUDIO — separate application shell ===== */
  body.studio #app{max-width:none;}
  .st-top{flex:none;display:flex;align-items:center;gap:4px;padding:0 22px;background:var(--bar-bg);color:var(--bar-fg);}
  .st-top .brand{font-weight:800;letter-spacing:2px;padding:15px 14px 15px 0;font-size:15px;}
  .st-top .brand span{color:var(--bar-dim);font-weight:400;letter-spacing:.14em;font-size:10px;font-family:var(--mono);margin-left:8px;}
  .st-top button{background:none;border:none;color:var(--bar-dim);font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:16px 12px;cursor:pointer;border-bottom:2px solid transparent;}
  .st-top button.on{color:var(--bar-fg);border-bottom-color:var(--red);}
  .st-top .exit{margin-left:auto;}
  .st-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;max-width:1280px;width:100%;margin:0 auto;}
  .st-head{flex:none;display:flex;align-items:center;gap:14px;padding:18px 22px 10px;}
  .st-head h2{margin:0;font-family:var(--grot);font-weight:900;font-size:24px;letter-spacing:-.02em;text-transform:uppercase;}
  .st-head .meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);}
  .st-search{background:var(--card);border:1px solid var(--line-2);color:var(--ink);padding:8px 12px;border-radius:8px;font-size:13px;outline:none;width:240px;}
  .st-list{flex:1;min-height:0;overflow-y:auto;padding:0 22px 30px;}
  .st-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:6px;user-select:none;-webkit-user-select:none;}
  .st-row:hover{background:var(--card);}
  .st-row .nm{flex:1;font-family:var(--grot);font-weight:700;font-size:15px;min-width:0;overflow-wrap:anywhere;}
  .st-row .thumb{width:44px;min-height:36px;}
  .st-row .mut{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.04em;}
  .st-new{display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:1.5px dashed var(--line-2);border-radius:8px;padding:9px 16px;color:var(--ink-2);cursor:pointer;margin:10px 22px;}
  .st-panes{flex:1;min-height:0;display:flex;overflow:hidden;}
  .st-pane{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
  .st-pane+.st-pane{border-left:2px solid var(--ink);}
  .st-doc-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-bottom:1px solid var(--line);border-radius:6px;cursor:grab;user-select:none;-webkit-user-select:none;}
  .st-doc-row .nm{flex:1;font-family:var(--grot);font-weight:700;font-size:14px;min-width:0;}
  .st-mini{background:none;border:1px solid var(--line-2);border-radius:6px;color:var(--ink-2);width:26px;height:26px;font-size:12px;cursor:pointer;flex:none;}
  .st-freq{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink-2);border:1px solid var(--line-2);border-radius:999px;padding:3px 9px;cursor:pointer;white-space:nowrap;}
  .st-serhd{display:flex;align-items:center;gap:9px;background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:14px;cursor:grab;user-select:none;-webkit-user-select:none;}
  .st-serhd .nm{flex:1;font-family:var(--grot);font-weight:800;font-size:14px;text-transform:uppercase;cursor:pointer;}
  .st-target{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .st-target b{color:var(--red-ink);cursor:pointer;}
  .st-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .st-btn{background:var(--card);border:1px solid var(--line-2);border-radius:8px;padding:8px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);cursor:pointer;}
  .st-btn.primary{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;}
  .st-btn.danger{color:var(--red-ink);border-color:var(--red-ink);background:none;}
  @media (max-width:900px){ .st-panes{flex-direction:column;} .st-pane+.st-pane{border-left:none;border-top:2px solid var(--ink);} }
  /* toast */
  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(8px);background:var(--bar-bg);color:var(--bar-fg);
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border-radius:999px;
    opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:50;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body><div id="app"></div>
<script>
/* ============================================================
   DURO — application script (clean rewrite, recovery plan v1)
   Two apps, one backend: trainee (program/session/find) + studio (/trainer)
   ============================================================ */
'use strict';
const API='https://api.duro.fit/v1';
const GROUPS=['neck','shoulders','back','chest','arms','core','legs']; // body order
const FREQS=[1,2,3,'every'];
const SORTS=['manual','tag','region','az'];
const SORTLBL={manual:'my order',tag:'tag',region:'region',az:'a–z'};
const COLORS=['','#F59F00','#E8590C','#D6336C','#581C87','#16335E','#14532D','#3A3F45'];
const cap=s=>s[0].toUpperCase()+s.slice(1);
const esc=s=>(''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid=()=> 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const $=document.getElementById('app');

/* ---------- state ---------- */
let CAT={exercises:[]},EXBY={},M2R={},COMMON={},REGMUS={},MEDIA={};
let DB={program:[],series:[],session:[],sessDone:[],doneCount:{},serDone:{},ratings:{},tags:[],exTags:{},media:{},activeProgram:null,subscriptions:[],active_id:null};
let UI={screen:'program',filter:'all',goal:'all',sort:'manual',showFilters:false,
        authMode:'login',authStage:null,authEmail:'',invite:'',pLang:'en',
        did:null,from:'program',fid:null,ppid:null,sprintOpen:true,openSer:{},openSesSer:{}};
const PENDH=location.hash, PENDPATH=location.pathname;

/* ---------- auth + sync ---------- */
const syncToken=()=>localStorage.getItem('duro_sync_token')||'';
const authed=()=>!!(syncToken()&&localStorage.getItem('duro_email')&&localStorage.getItem('duro_profile')==='1');
const canAuthor=()=>localStorage.getItem('duro_trainer')==='1';

let _toastT=null;
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent=msg||'saved'; t.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),1300);
}

let _pushT=null;
function schedulePush(){ if(!syncToken())return; clearTimeout(_pushT); _pushT=setTimeout(pushUp,1500); }
async function pushUp(){
  if(!syncToken())return;
  try{
    const r=await fetch(API+'/state',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},body:JSON.stringify({state:DB})});
    if(r.status===401){ authAbort(); return; }
    if(r.ok){ const d=await r.json(); localStorage.setItem('duro_sync_at',d.updated_at); }
  }catch(_){/* offline — next save retries */}
}
async function pullState(){
  if(!syncToken())return;
  try{
    const r=await fetch(API+'/state',{headers:{'Authorization':'Bearer '+syncToken()}});
    if(r.status===401){ authAbort(); return; }
    if(!r.ok) return;
    const d=await r.json();
    if(d.is_trainer!==undefined) localStorage.setItem('duro_trainer',d.is_trainer?'1':'0');
    if(d.profile_complete===false){ localStorage.removeItem('duro_profile'); UI.authStage='profile'; render(); return; }
    if(d.profile_complete===true) localStorage.setItem('duro_profile','1');
    const known=localStorage.getItem('duro_sync_at')||'';
    let dirty=false;
    if(d.state&&Object.keys(d.state).length&&d.updated_at!==known){
      DB=Object.assign(DB,d.state);
      ensureLibraryShape(); hydrateActive();
      localStorage.setItem('hard_mvp',JSON.stringify(DB));
      localStorage.setItem('duro_sync_at',d.updated_at);
      dirty=true; toast('synced');
    }
    // refresh the subscribed program's live content regardless — the trainer's
    // edits don't touch the trainee's own state, so this can't ride on the diff above
    if(await loadActiveProgram()) dirty=true;
    if(dirty) render();
  }catch(_){/* offline */}
}
const save=()=>{ dehydrateActive(); localStorage.setItem('hard_mvp',JSON.stringify(DB)); schedulePush(); };

/* ---------- program library: many subscriptions, one active ----------
   Each subscription holds its OWN cycle progress. The active sub's progress is mirrored
   into the flat DB fields (doneCount/serDone/session/sessDone) that every renderer reads;
   hydrate copies sub→flat, dehydrate copies flat→sub. */
const PROGKEYS=['doneCount','serDone','session','sessDone'];
const activeSub=()=>(DB.subscriptions||[]).find(s=>s.public_id===DB.active_id)||null;
function normProgress(pr){ pr=pr||{};
  return {doneCount:pr.doneCount||{},serDone:pr.serDone||{},
          session:(pr.session||[]).map(it=>typeof it==='string'?{k:'e',id:it}:it),
          sessDone:pr.sessDone||[]}; }
function ensureLibraryShape(){
  if(!Array.isArray(DB.subscriptions)) DB.subscriptions=[];
  if(DB.active_id===undefined) DB.active_id=null;
  DB.subscriptions.forEach(s=>{ s.progress=normProgress(s.progress); });
  // migrate legacy single-program state (activeProgram + flat progress) into one subscription
  if(!DB.subscriptions.length && DB.activeProgram && DB.activeProgram.public_id){
    DB.subscriptions=[{public_id:DB.activeProgram.public_id,name:DB.activeProgram.name||'',by:DB.activeProgram.by||'',
      progress:normProgress({doneCount:DB.doneCount,serDone:DB.serDone,session:DB.session,sessDone:DB.sessDone})}];
    DB.active_id=DB.activeProgram.public_id;
  }
  if(DB.active_id && !activeSub()) DB.active_id=(DB.subscriptions[0]||{}).public_id||null;
}
function hydrateActive(){
  const s=activeSub(); const pr=normProgress(s&&s.progress);
  DB.doneCount=pr.doneCount; DB.serDone=pr.serDone; DB.session=pr.session; DB.sessDone=pr.sessDone;
  DB.activeProgram=s?{public_id:s.public_id,name:s.name,by:s.by}:null;
  if(!s){ DB.program=[]; DB.series=[]; }
}
function dehydrateActive(){
  const s=activeSub(); if(!s) return;
  s.progress={doneCount:DB.doneCount,serDone:DB.serDone,session:DB.session,sessDone:DB.sessDone};
}

/* active subscription's content is read LIVE from the trainer so their edits propagate.
   progress is the trainee's and is left untouched. */
async function loadActiveProgram(){
  const ap=DB.activeProgram; if(!ap||!ap.public_id) return false;
  try{
    const r=await fetch(API+'/programs/'+ap.public_id,{headers:{'Authorization':'Bearer '+syncToken()}});
    if(!r.ok) return false; // unpublished / offline → keep the cached copy
    const d=await r.json(); const c=d.content||{};
    DB.program=(c.entries||[]).map(p=>typeof p==='string'?{id:p,freq:1}:p);
    DB.series=c.series||[];
    DB.activeProgram={public_id:d.public_id,name:d.name,by:d.by};
    const s=activeSub(); if(s){ s.name=d.name; s.by=d.by; } // keep the library row's label fresh
    localStorage.setItem('hard_mvp',JSON.stringify(DB));
    return true;
  }catch(_){ return false; } // offline: keep snapshot
}
function loadLocal(){
  try{
    const raw=JSON.parse(localStorage.getItem('hard_mvp')||'{}');
    DB=Object.assign(DB,raw);
    DB.series=DB.series||[]; DB.sessDone=DB.sessDone||[]; DB.doneCount=DB.doneCount||{}; DB.serDone=DB.serDone||{};
    DB.tags=DB.tags||[]; DB.exTags=DB.exTags||{}; DB.media=DB.media||{}; DB.ratings=DB.ratings||{};
    DB.program=(DB.program||[]).map(p=>typeof p==='string'?{id:p,freq:1}:p);
    DB.session=(DB.session||[]).map(it=>typeof it==='string'?{k:'e',id:it}:it);
    ensureLibraryShape(); hydrateActive();
  }catch(_){}
}
async function loadExercises(){
  try{
    const r=await fetch(API+'/exercises',{headers:{'Authorization':'Bearer '+syncToken()}});
    if(r.status===401){ authAbort(); return false; }
    const d=await r.json();
    CAT={exercises:d.exercises};
    try{ localStorage.setItem('duro_excache',JSON.stringify(d.exercises)); }catch(_){}
  }catch(_){
    const c=localStorage.getItem('duro_excache');
    CAT={exercises:c?JSON.parse(c):[]};
  }
  EXBY={}; CAT.exercises.forEach(e=>{EXBY[e.original_name]=e;});
  return true;
}

/* ---------- router ---------- */
const ROUTEPATHS={programs:'/programs',program:'/program',session:'/session',find:'/find',trainer:'/trainer'};
function applyPath(p){
  if(p&&p.startsWith('/p/')){ UI.ppid=p.slice(3); PPDATA=null; UI.screen='progpage'; return; }
  UI.screen={'/programs':'programs','/program':'program','/session':'session','/find':'find','/trainer':'trainer','/':'programs'}[p]||'programs';
  if(UI.screen==='trainer'&&!canAuthor()) UI.screen='programs';
}
function landAfterAuth(){
  if(PENDH.startsWith('#p/')) applyPath('/p/'+PENDH.slice(3));
  else applyPath(PENDPATH);
}
window.go=s=>{
  if(s==='trainer'&&!canAuthor()) s='program';
  UI.screen=s;
  if(ROUTEPATHS[s]) history.pushState(null,'',ROUTEPATHS[s]);
  render();
};
addEventListener('popstate',()=>{ if(authed()){ applyPath(location.pathname); render(); } });
addEventListener('hashchange',()=>{ if(authed()&&location.hash.startsWith('#p/')) showProgPage(location.hash.slice(3)); });

/* ---------- coverage / muscles ---------- */
function exGroups(e){
  const o={};
  (e.secondary||[]).forEach(m=>(M2R[m]||[]).forEach(r=>{if(!o[r])o[r]='sec';}));
  (e.primary||[]).forEach(m=>(M2R[m]||[]).forEach(r=>o[r]='pri'));
  return o;
}
const priGroups=e=>Object.entries(exGroups(e)).filter(([,r])=>r==='pri').map(([g])=>g);
const countOf=id=>(DB.doneCount[id]||0)+(DB.sessDone.includes(id)?1:0);
function coverage(){
  const c={}; GROUPS.forEach(g=>c[g]=0);
  const ids=new Set([...Object.keys(DB.doneCount),...DB.sessDone]);
  ids.forEach(id=>{ const e=EXBY[id]; if(!e)return; const n=countOf(id); if(n>0) priGroups(e).forEach(g=>{if(g in c)c[g]+=n;}); });
  return c;
}
function coverageFrom(map){
  const c={}; GROUPS.forEach(g=>c[g]=0);
  Object.entries(map).forEach(([id,n])=>{ const e=EXBY[id]; if(e&&n>0) priGroups(e).forEach(g=>{if(g in c)c[g]+=n;}); });
  return c;
}
function plannedByRegion(){
  const c={}; GROUPS.forEach(g=>c[g]=0);
  DB.program.filter(p=>p.freq!=='every').forEach(p=>{ const e=EXBY[p.id]; if(e) priGroups(e).forEach(g=>{if(g in c)c[g]+=p.freq;}); });
  DB.series.filter(s=>s.freq!=='every').forEach(s=>{ s.exIds.forEach(id=>{ const e=EXBY[id]; if(e) priGroups(e).forEach(g=>{if(g in c)c[g]+=s.freq;}); }); });
  return c;
}
const disp=m=>{ const c=COMMON[m]; return c?`${m} (${c})`:m; };

/* ---------- media ---------- */
const slug=s=>(''+s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function mediaSrc(id){
  const e=EXBY[id];
  if(e&&e.media_url) return e.media_url;
  if(DB.media&&DB.media[id]) return DB.media[id];
  const f=MEDIA[slug(id)]; return f?('media/'+f):null;
}
function mediaHTML(id,cls){
  const src=mediaSrc(id);
  if(!src) return `<div class="thumb ${cls||''}"><span class="ply">▶</span></div>`;
  if(/\.(mp4|webm|mov)(\?|$)/i.test(src)||/^data:video/.test(src)) return `<div class="thumb ${cls||''}"><video src="${src}" muted loop autoplay playsinline></video></div>`;
  return `<div class="thumb ${cls||''}"><img src="${src}" alt="" loading="lazy"></div>`;
}

/* ---------- tags + ratings ---------- */
/* tags live ON the exercise entity ({name,color}, max 3) — same for everyone, edited by the owner */
const tagsOf=id=>((EXBY[id]||{}).tags)||[];
const tagLine=id=>{ const ts=tagsOf(id); return ts.length?`<div class="tline">${ts.map(t=>`<span class="tpill" style="--tc:${t.color}">${esc(t.name)}</span>`).join('')}</div>`:''; };
const tagDots=id=>{ const ts=tagsOf(id); return ts.length?`<span style="display:inline-flex;gap:3px;flex:none">${ts.map(t=>`<span style="width:8px;height:8px;border-radius:50%;background:${t.color}"></span>`).join('')}</span>`:''; };
const tagPal=()=>{ const seen={},out=[]; // every distinct tag in the loaded catalog = the palette
  for(const e of CAT.exercises) for(const t of (e.tags||[])) if(t&&t.name&&!seen[t.name.toLowerCase()]){ seen[t.name.toLowerCase()]=1; out.push(t); }
  return out.sort((a,b)=>a.name.localeCompare(b.name)); };
const tagPicker=id=>{ const e=EXBY[id]||{};
  if(!e.mine){ const ts=tagsOf(id);
    return ts.length?`<div class="tpicks">${ts.map(t=>`<span class="tpick on" style="--tc:${t.color}">${esc(t.name)}</span>`).join('')}</div>`:'<div class="legendln">no tags</div>'; }
  return `<div class="tpicks">${tagPal().map(t=>{ const on=tagsOf(id).some(x=>x.name===t.name);
    return `<span class="tpick ${on?'on':''}" style="--tc:${t.color}" onclick="event.stopPropagation();toggleTag('${esc(id)}','${esc(t.name)}','${t.color}')">${esc(t.name)}</span>`; }).join('')}
  <span class="tpick" style="--tc:var(--ink-3)" onclick="event.stopPropagation();newTag('${esc(id)}')">+ new tag</span></div>`; };
async function pushExTags(id){ const e=EXBY[id];
  try{
    const r=await fetch(API+'/exercises/'+encodeURIComponent(id),{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},
      body:JSON.stringify({tags:e.tags||[]})});
    if(r.ok){ toast('saved'); try{localStorage.setItem('duro_excache',JSON.stringify(CAT.exercises));}catch(_){} }
    else toast('save failed');
  }catch(_){ toast('offline'); } }
window.toggleTag=(id,name,color)=>{ const e=EXBY[id]; if(!e||!e.mine){ toast('not your exercise'); return; }
  e.tags=e.tags||[];
  const i=e.tags.findIndex(t=>t.name===name);
  if(i>=0) e.tags.splice(i,1);
  else { if(e.tags.length>=3){ toast('max 3 tags'); return; } e.tags.push({name,color}); }
  pushExTags(id); render();
  const m=document.getElementById('ctxm'); if(m&&CTX) m.innerHTML=buildCtx(CTX.id); };
window.newTag=id=>{ const e=EXBY[id]; if(!e||!e.mine){ toast('not your exercise'); return; }
  if((e.tags||[]).length>=3){ toast('max 3 tags'); return; }
  const raw=prompt('tag name'); if(!raw)return;
  const nm=raw.trim(); if(!nm)return;
  const ex=tagPal().find(t=>t.name.toLowerCase()===nm.toLowerCase()); // reuse existing name+color
  toggleTag(id,ex?ex.name:nm,ex?ex.color:COLORS[1+(tagPal().length%(COLORS.length-1))]); };
const ratingOf=id=>(DB.ratings||{})[id]||0;
const starsHTML=id=>`<div class="stars">`+[1,2,3,4,5].map(n=>`<span class="star ${n<=ratingOf(id)?'on':''}" onclick="event.stopPropagation();setRating('${esc(id)}',${n})">★</span>`).join('')+`</div>`;
window.setRating=(id,n)=>{ DB.ratings[id]=(DB.ratings[id]===n?0:n); save(); toast('saved'); render(); };

/* ---------- session model ---------- */
function sessionLeaves(){
  const out=[];
  for(const it of DB.session){
    if(it.k==='s'){ const s=DB.series.find(x=>x.id===it.sid); if(s) s.exIds.forEach(id=>{if(!out.includes(id))out.push(id);}); }
    else if(!out.includes(it.id)) out.push(it.id);
  }
  return out;
}
const inSession=id=>sessionLeaves().includes(id);
const seriesInSession=sid=>DB.session.some(it=>it.k==='s'&&it.sid===sid);
function seedSession(){
  if(DB.session.length) return;
  DB.series.filter(s=>s.freq==='every'&&s.exIds.length).forEach(s=>DB.session.push({k:'s',sid:s.id}));
  DB.program.filter(p=>p.freq==='every').forEach(p=>{ if(!inSession(p.id)) DB.session.push({k:'e',id:p.id}); });
}
window.toggleSession=id=>{
  const i=DB.session.findIndex(it=>it.k==='e'&&it.id===id);
  if(i>=0) DB.session.splice(i,1);
  else if(!inSession(id)) DB.session.push({k:'e',id});
  save(); render();
};
window.toggleSeries=sid=>{
  const i=DB.session.findIndex(it=>it.k==='s'&&it.sid===sid);
  if(i>=0) DB.session.splice(i,1); else DB.session.push({k:'s',sid});
  save(); render();
};
window.toggleDone=id=>{ const i=DB.sessDone.indexOf(id); if(i>=0)DB.sessDone.splice(i,1); else DB.sessDone.push(id); save(); render(); };
window.finish=()=>{
  window._prevCov=coverageFrom(DB.doneCount);
  window._finN=DB.sessDone.length;
  DB.session.filter(it=>it.k==='s').forEach(it=>{ const s=DB.series.find(x=>x.id===it.sid);
    if(s&&s.exIds.length&&s.exIds.every(id=>DB.sessDone.includes(id))) DB.serDone[s.id]=(DB.serDone[s.id]||0)+1; });
  DB.sessDone.forEach(id=>{DB.doneCount[id]=(DB.doneCount[id]||0)+1;});
  DB.sessDone=[]; DB.session=[]; seedSession(); save(); UI.screen='complete'; render();
};
window.toggleSerOpen=sid=>{ UI.openSer[sid]=!UI.openSer[sid]; render(); };
window.toggleSesSer=sid=>{ UI.openSesSer[sid]=UI.openSesSer[sid]===false?true:false; render(); };

/* ---------- shared UI bits ---------- */
function nav(){
  const n=sessionLeaves().length;
  const onLib=UI.screen==='programs'||UI.screen==='program'||UI.screen==='progpage'||UI.screen==='find';
  return `<div class="nav">
    <button class="${onLib?'on':''}" onclick="go('programs')">programs</button>
    <button class="${UI.screen==='session'?'on':''}" onclick="go('session')">session ${n?'· '+n:''}</button>
    <button onclick="toggleTheme()" style="flex:none;min-width:46px" title="theme">◐</button>
  </div>`;
}
const goalBtns=()=>['all','mobility','hypertrophy','therapy'].map(g=>`<button class="gb ${UI.goal===g?'on':''}" onclick="setGoal('${g}')">${g}</button>`).join('');
function filterBar(showSort){
  const active=[UI.goal!=='all'?UI.goal:null, UI.filter!=='all'?cap(UI.filter):null].filter(Boolean);
  return `<div class="gbar"><button class="gb ${UI.showFilters?'on':''}" onclick="toggleFilters()">filters ${UI.showFilters?'▾':'▸'}</button>`+
    (showSort?`<button class="gb ${UI.sort!=='manual'?'on':''}" onclick="cycleSort()">sort: ${SORTLBL[UI.sort]}</button>`:'')+
    (!UI.showFilters&&active.length?`<button class="gb on" onclick="clearFilters()">${active.join(' · ')} ×</button>`:'')+`</div>`;
}
window.setFilter=g=>{UI.filter=g;render();};
window.setGoal=g=>{UI.goal=g;render();};
window.toggleFilters=()=>{UI.showFilters=!UI.showFilters;render();};
window.clearFilters=()=>{UI.filter='all';UI.goal='all';render();};

function freqDisp(p){
  if(p.freq==='every') return `<span class="freq"><span class="ev">● EVERY SESSION</span></span>`;
  const n=countOf(p.id);
  return `<span class="freq"><span class="seg">${Array.from({length:p.freq},(_,i)=>`<b class="${i<n?'done':''}"></b>`).join('')}</span>${Math.min(n,p.freq)}/${p.freq}</span>`;
}

  if(s.freq==='every') return `<span class="freq"><span class="ev">● EVERY SESSION</span></span>`;

}

window.authSend=async()=>{
  const email=(document.getElementById('authEmail').value||'').trim().toLowerCase();
  if(!email.includes('@')){ toast('enter a valid email'); return; }
  UI.authEmail=email;
  const inviteEl=document.getElementById('authInvite');
  UI.invite=inviteEl?(inviteEl.value||'').trim().toUpperCase():'';
  try{
    const r=await fetch(API+'/auth/request-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,invite:UI.invite})});
    if(r.status===403){ toast(UI.authMode==='signup'?'valid invite code required':'no account for that email — tap sign up'); return; }
    if(!r.ok){ toast('could not send code'); return; }
    UI.authStage='code'; render();
  }catch(_){ toast('cannot reach api.duro.fit'); }
};
window.authVerify=async()=>{
  const code=(document.getElementById('authCode').value||'').trim();
  if(code.length<6){ toast('enter the 6-digit code'); return; }
  try{
    const r=await fetch(API+'/auth/verify',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:UI.authEmail,code,invite:UI.invite||'',sync_token:syncToken()||undefined})});
    if(!r.ok){ toast('bad or expired code'); return; }
    const d=await r.json();
    localStorage.setItem('duro_sync_token',d.token);
    localStorage.setItem('duro_email',d.email);
    localStorage.setItem('duro_trainer',d.is_trainer?'1':'0');
    localStorage.removeItem('duro_sync_at');
    if(!d.profile_complete){ UI.authStage='profile'; render(); return; }
    localStorage.setItem('duro_profile','1');
    UI.authStage=null;
    await loadExercises(); await pullState(); pushUp(); toast('signed in');
    landAfterAuth(); render();
  }catch(_){ toast('cannot reach api.duro.fit'); }
};
window.authProfile=async()=>{
  const f=(document.getElementById('pFirst').value||'').trim();
  const l=(document.getElementById('pLast').value||'').trim();
  const cc=(document.getElementById('pCC').value||'').trim();
  const ph=(document.getElementById('pPhone').value||'').replace(/[^0-9]/g,'');

    localStorage.setItem('duro_profile','1');
    UI.authStage=null;

  }catch(_){ toast('cannot reach api.duro.fit'); }

/* ---------- drag to reorder (program backlog "p", session "s") ---------- */
let DRAG=null, SUPCLICK=false;
document.addEventListener('click',ev=>{ if(SUPCLICK){SUPCLICK=false;ev.stopPropagation();ev.preventDefault();} },true);
document.addEventListener('pointerdown',ev=>{
  if(ev.pointerType==='mouse'&&ev.button!==0) return; // right/middle click never starts a drag
  let row=null;
  const hd=ev.target.closest('.dh');
  if(hd) row=hd.closest('[data-did]');
  else if(ev.pointerType==='mouse'){
    const sh=ev.target.closest('.st-serhd[data-sec]'); // series header: click = rename/freq/etc, move = drag whole series
    if(sh){ DRAG={spend:{hdr:sh,x:ev.clientX,y:ev.clientY}}; return; }
    const lr=ev.target.closest('[data-add]'); // left pane: could be a click (add to target) or a drag into the doc
    if(lr){ DRAG={pend:{key:lr.dataset.add,x:ev.clientX,y:ev.clientY,moved:false}}; return; }
    if(!ev.target.closest('button,.st-freq')) row=ev.target.closest('[data-did][data-grp^="st:"]'); // studio rows: grab anywhere
  }
  if(!row) return;
  ev.preventDefault();
  DRAG={row,grp:row.dataset.grp};
  row.classList.add('lift');
},{passive:false});
const serBlock=h=>{ const els=[h]; let n=h.nextElementSibling; // header + its member rows
  while(n&&!n.dataset.sec&&!n.classList.contains('st-serhd')){ els.push(n); n=n.nextElementSibling; }
  return els; };
document.addEventListener('pointermove',ev=>{
  if(!DRAG) return;
  if(DRAG.spend){ const p=DRAG.spend;
    if(Math.abs(ev.clientX-p.x)+Math.abs(ev.clientY-p.y)>5){ ev.preventDefault(); p.hdr.classList.add('lift'); DRAG={sblock:true,hdr:p.hdr}; }
    return;
  }
  if(DRAG.sblock){ ev.preventDefault(); // move the whole series above/below other series blocks
    for(const o of [...document.querySelectorAll('#stdoc .st-serhd[data-sec]')].filter(x=>x!==DRAG.hdr)){
      const b=o.getBoundingClientRect();
      if(ev.clientY>b.top&&ev.clientY<b.bottom){
        const blk=serBlock(DRAG.hdr), obl=serBlock(o), par=o.parentNode;
        const ref=ev.clientY<b.top+b.height/2?obl[0]:obl[obl.length-1].nextSibling;
        blk.forEach(el=>par.insertBefore(el,ref));
        break;
      }
    }
    return;
  }
  if(DRAG.pend){ // dragging out of MY EXERCISES: materialize a row once the cursor reaches the doc pane
    const p=DRAG.pend;
    if(Math.abs(ev.clientX-p.x)+Math.abs(ev.clientY-p.y)>5) p.moved=true;
    if(!p.moved) return;
    ev.preventDefault();
    const cont=document.getElementById('stdoc'); if(!cont){DRAG=null;return;}
    if(ev.clientX>cont.getBoundingClientRect().left-20){
      const el=document.createElement('div');
      el.className='st-doc-row lift'; el.dataset.did=p.key; el.dataset.grp='st:drop';
      el.innerHTML=`${stThumb(p.key)}<span class="nm">${esc(stName(p.key))}</span>`;
      cont.appendChild(el);
      DRAG={row:el,grp:'st:drop',fromLeft:true};
    }
    return;
  }
  ev.preventDefault();
  const st=DRAG.grp.startsWith('st:'); // studio doc: drag across sections
  const sibs=[...document.querySelectorAll(st?'[data-grp^="st:"]':`[data-grp="${DRAG.grp}"]`)].filter(r=>r!==DRAG.row);
  for(const s of sibs){
    const b=s.getBoundingClientRect();
    if(ev.clientY>b.top&&ev.clientY<b.bottom){
      if(ev.clientY<b.top+b.height/2) s.parentNode.insertBefore(DRAG.row,s);
      else s.parentNode.insertBefore(DRAG.row,s.nextSibling);
      return;
    }
  }
  if(st){
    for(const hd of document.querySelectorAll('[data-sec]')){ // hover a section header → drop in at its top
      const b=hd.getBoundingClientRect();
      if(b.height&&ev.clientY>b.top&&ev.clientY<b.bottom){ hd.parentNode.insertBefore(DRAG.row,hd.nextSibling); return; }
    }
    const cont=document.getElementById('stdoc'); // below everything → loose
    const last=cont&&[...cont.children].filter(c=>c!==DRAG.row).pop();
    if(last&&ev.clientY>last.getBoundingClientRect().bottom) cont.appendChild(DRAG.row);
  }
},{passive:false});
document.addEventListener('pointerup',()=>{
  if(!DRAG) return;
  if(DRAG.spend){ DRAG=null; return; } // never moved — let the click through
  if(DRAG.sblock){
    SUPCLICK=true; DRAG.hdr.classList.remove('lift'); DRAG=null;
    const d=ST.doc; if(!d) return;
    const order=[...document.querySelectorAll('#stdoc .st-serhd[data-sec]')].map(h=>h.dataset.sec);
    d.series.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
    ST.dirty=true; renderStudio(); return;
  }
  if(DRAG.pend){ if(DRAG.pend.moved) SUPCLICK=true; DRAG=null; return; } // drag started but never reached the doc
  if(DRAG.fromLeft) SUPCLICK=true; // real drop — eat the click so stAdd doesn't double-add
  DRAG.row.classList.remove('lift');
  const grp=DRAG.grp; DRAG=null;
  const ids=[...document.querySelectorAll(`[data-grp="${grp}"]`)].map(r=>r.dataset.did);
  if(grp.startsWith('st:')){
    const d=ST.doc, cont=document.getElementById('stdoc'); if(!d||!cont) return;
    // rebuild the whole document from DOM order: rows belong to the section header above them
    const ser={}; d.series.forEach(s=>ser[s.id]=[]);
    const ents=[]; let cur='entries';
    for(const el of cont.children){
      if(el.dataset.sec){ cur=el.dataset.sec; continue; }
      const did=el.dataset.did; if(!did) continue;
      if(cur!=='entries'&&ser[cur]){ if(!ser[cur].includes(did)) ser[cur].push(did); }
      else if(!ents.some(e=>e.id===did)) ents.push(d.entries.find(e=>e.id===did)||{id:did,freq:1});
    }
    d.series.forEach(s=>s.exIds=ser[s.id]);
    d.entries=ents;
    ST.dirty=true; renderStudio(); return;
  }
  if(grp==='p'){
    const set=new Set(ids);
    const reordered=ids.map(id=>DB.program.find(p=>p.id===id)).filter(Boolean);
    let k=0;
    DB.program=DB.program.map(p=>set.has(p.id)?reordered[k++]:p);
  } else if(grp==='s'){
    const series=DB.session.filter(it=>it.k==='s');
    const loose=DB.session.filter(it=>it.k==='e').sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
    DB.session=[...series,...loose];
  }
  save(); toast('order saved'); render();
});

/* ---------- trainee: THE PROGRAM ---------- */
function renderProgram(){
  const cov=coverage(), plan=plannedByRegion();
  let entries=DB.program.map(p=>({p,e:EXBY[p.id]})).filter(x=>x.e);
  if(UI.goal!=='all') entries=entries.filter(x=>(x.e.goals||[]).includes(UI.goal));
  if(UI.filter!=='all') entries=entries.filter(x=>UI.filter in exGroups(x.e));
  if(UI.sort==='tag'){ const key=x=>{ const ts=tagsOf(x.p.id); return ts.length?ts.map(t=>t.name.toLowerCase()).sort()[0]:'￿'; };
    entries.sort((a,b)=>key(a).localeCompare(key(b))); }
  else if(UI.sort==='region'){ const home=e=>GROUPS.findIndex(g=>exGroups(e)[g]==='pri'); entries.sort((a,b)=>home(a.e)-home(b.e)); }
  else if(UI.sort==='az') entries.sort((a,b)=>a.e.suggested_name.localeCompare(b.e.suggested_name));
  const numeric=DB.program.filter(p=>p.freq!=='every');
  const totalSlots=numeric.reduce((s,p)=>s+p.freq,0);
  const doneSlots=numeric.reduce((s,p)=>s+Math.min(countOf(p.id),p.freq),0);
  const sessN=sessionLeaves().length;
  const ap=DB.activeProgram;
  let h=`<div class="hd">
    <div class="eye">${ap?`<span>${esc(ap.name)} · ${esc(ap.by)}</span>`:'<span>&nbsp;</span>'}</div>
    <div class="trow"><div class="ttl">the<br>program</div></div>
    ${totalSlots?`<div class="meter">${Array.from({length:totalSlots},(_,i)=>`<i class="${i<doneSlots?'on':''}"></i>`).join('')}</div>`:''}
  </div>
  ${filterBar(true)}
  ${UI.showFilters?`<div class="gbar">${goalBtns()}</div>
  <div class="chips">
    <div class="chip ${UI.filter==='all'?'sel':''}" onclick="setFilter('all')"><span class="nm">All</span><span class="ct">${DB.program.length}</span></div>
    ${GROUPS.map(g=>`<div class="chip ${UI.filter===g?'sel':''} ${plan[g]>0&&cov[g]<plan[g]?'owed':''}" onclick="setFilter('${g}')"><span class="nm">${cap(g)}</span>${plan[g]>0?`<span class="ct">${Math.min(cov[g],plan[g])}/${plan[g]}</span>`:''}</div>`).join('')}
  </div>`:''}
  <div class="list">`;
  // a subscribed program is the trainer's live structure — not the trainee's to reorder (fork to customize)
  const draggable=!DB.activeProgram&&UI.filter==='all'&&UI.goal==='all'&&UI.sort==='manual';
  const serRow=(s,inn)=>{ const open=!!UI.openSer[s.id];
    let r=`<div class="row ser ${inn?'in':''}">
        <div class="thumb sthumb" style="width:78px;min-height:74px"><span class="ply" style="font-size:17px">≣</span><span class="ct2">${s.exIds.length}</span></div>
        <div class="rb" onclick="toggleSerOpen('${s.id}')"><div class="rtop"><span class="sname">${esc(s.name)}</span><span class="goal">series</span></div>
          <div class="smeta"><span>${s.exIds.length} exercise${s.exIds.length===1?'':'s'}</span>${serFreqDisp(s)}</div></div>
        <button class="mv" style="align-self:center" onclick="toggleSerOpen('${s.id}')">${open?'▾':'▸'}</button>
        <div class="add" onclick="event.stopPropagation();toggleSeries('${s.id}')">${inn?'✓':'+'}</div></div>`;
    if(open) r+=s.exIds.map((xid,i)=>{ const e=EXBY[xid];
      return `<div class="ordrow" style="padding-left:44px;background:var(--paper-2)"><span class="num">${i+1}</span><span class="exn" style="font-size:14px;color:var(--ink-2)">${esc(e?e.suggested_name:xid)}</span></div>`; }).join('');
    return r; };
  const progRow=({p,e},picked)=>{ const id=p.id;
    return `<div class="row ${picked?'in':''}" data-ctx="${esc(id)}" oncontextmenu="openCtxEv(event,'${esc(id)}')" ${picked?'':`data-did="${esc(id)}" data-grp="p"`}>
        ${mediaHTML(id)}<div class="rb" onclick="showDetail('${esc(id)}','program')">${tagLine(id)}<div class="rtop"><span class="${nameCls(e)}">${esc(e.suggested_name)}</span>${freqDisp(p)}</div><div class="tags">${tagsHTML(e)}</div>${starsHTML(id)}</div>
        <div class="add" onclick="event.stopPropagation();toggleSession('${esc(id)}')">${picked?'✓':'+'}</div>
        ${(!picked&&draggable)?'<span class="dh">≡</span>':''}</div>`; };

/* ---------- complete / focus / detail ---------- */
function renderComplete(){
  const cov=coverage(), prev=window._prevCov||{};
  const gained=GROUPS.filter(g=>cov[g]>(prev[g]||0));
  const plan=plannedByRegion();
  let h=`<div class="complete"><div class="ce">SESSION COMPLETE</div><div class="chk">✓</div><h1>done</h1>
    <div class="sl">${window._finN||0} exercises · nothing to log. coverage updated automatically.</div>
    <div class="covlist">`;
  const show=gained.length?gained:GROUPS.filter(g=>cov[g]>0);
  for(const g of show){
    const name=cap(g), t=plan[g];
    if(t>0){
      const now=Math.min(cov[g],t), was=Math.min(prev[g]||0,t), met=cov[g]>=t;
      h+=`<div class="cov"><div class="ct"><span class="cn">${name}</span><span class="cm ${met?'ok':''}">${met?'✓ ':''}${Math.min(cov[g],t)}/${t}</span></div>
        <div class="cbar"><span class="prev" style="width:${100*was/t}%"></span><span class="gain" style="width:${100*(now-was)/t}%"></span></div></div>`;
    } else {
      h+=`<div class="cov"><div class="ct"><span class="cn">${name}</span><span class="cm">+${cov[g]-(prev[g]||0)}</span></div></div>`;
    }
  }
  h+=`</div><div class="bar"><button class="go" style="width:100%" onclick="go('program')">BACK TO THE PROGRAM</button></div></div>${nav()}`;
  $.innerHTML=h;
}

window.enrollProgram=async pid=>{

  try{
    const r=await fetch(API+'/programs/'+pid+'/enroll',{method:'POST',headers:{'Authorization':'Bearer '+syncToken()}});
    if(r.status===402){ toast('paid program — payments coming soon'); return; }
    if(!r.ok){ toast('could not subscribe'); return; }
    const res=await r.json();
    localStorage.removeItem('duro_sync_at');
    await pullState();                       // pulls the new library shape + hydrates
    toast('added to library');
    if(res.active_id===pid){ await loadActiveProgram(); seedSession(); save(); go('program'); }
    else render();                           // stays on detail, now showing MAKE ACTIVE
  }catch(_){ toast('offline'); }
};

  dehydrateActive();                         // persist the outgoing program's progress
  try{
    const r=await fetch(API+'/programs/'+pid+'/activate',{method:'POST',headers:{'Authorization':'Bearer '+syncToken()}});
    if(!r.ok){ toast('could not activate'); return; }
    DB.active_id=pid; hydrateActive();
    await loadActiveProgram(); seedSession(); save();
    toast('now active'); go('program');
  }catch(_){ toast('offline'); }
};
window.unsubscribe=async pid=>{
  if(!confirm('leave this program? your progress in it is removed.'))return;
  try{
    const r=await fetch(API+'/programs/'+pid+'/subscription',{method:'DELETE',headers:{'Authorization':'Bearer '+syncToken()}});
    if(!r.ok){ toast('could not leave'); return; }
    const res=await r.json();
    DB.subscriptions=(DB.subscriptions||[]).filter(s=>s.public_id!==pid);
    DB.active_id=res.active_id; hydrateActive();
    await loadActiveProgram(); save();
    toast('left program'); go('programs');
  }catch(_){ toast('offline'); }
};

      <div class="row" style="border:none;padding:0;gap:16px">${src?`<div class="thumb ethumb"><img src="${src}"></div>`:`<div class="thumb ethumb"><span class="ply">▶</span></div>`}
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="file" accept="image/*,video/mp4,video/webm" onchange="stMedia(event)">
        <span class="st-btn" onclick="stGiphy()">paste Giphy link</span>
      </div></div></div>
    <div class="efield"><div class="lb">notes / cues</div><textarea class="txt" rows="3" style="max-width:420px;font-weight:400;font-size:14px" onchange="stExField('note',this.value)">${esc(e.note||'')}</textarea></div>
    <div class="efield"><div class="lb">goals</div><div class="mpills">${['hypertrophy','mobility','therapy'].map(g=>`<span class="mpill ${(e.goals||[]).includes(g)?'p':''}" onclick="stGoal('${g}')">${g}</span>`).join('')}</div></div>
    <div class="efield"><div class="lb">muscles — tap: none → primary → secondary</div>${mus}</div>
    <div class="efield"><span class="st-btn danger" onclick="stRetire()">retire exercise</span></div>
  </div>`;
}
async function stSaveEx(){
  const e=stExByKey(ST.exKey);
  try{
    const r=await fetch(API+'/exercises/'+encodeURIComponent(ST.exKey),{method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},
      body:JSON.stringify({name:e.suggested_name,primary:e.primary,secondary:e.secondary,goals:e.goals,note:e.note||''})});
    toast(r.ok?'saved':'save failed');
  }catch(_){ toast('offline — not saved'); }
}
window.stExField=(f,v)=>{ const e=stExByKey(ST.exKey); if(f==='name')e.suggested_name=v.trim()||e.suggested_name; else e.note=v; stSaveEx(); renderStudio(); };
window.stGoal=g=>{ const e=stExByKey(ST.exKey); e.goals=e.goals||[]; const i=e.goals.indexOf(g); i>=0?e.goals.splice(i,1):e.goals.push(g); stSaveEx(); renderStudio(); };
window.stCycleMus=m=>{ const e=stExByKey(ST.exKey); e.primary=e.primary||[]; e.secondary=e.secondary||[];
  if(e.primary.includes(m)){ e.primary=e.primary.filter(x=>x!==m); e.secondary.push(m); }
  else if(e.secondary.includes(m)){ e.secondary=e.secondary.filter(x=>x!==m); }
  else e.primary.push(m);
  stSaveEx(); renderStudio(); };
window.stMedia=async ev=>{ const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  if(f.size>15*1024*1024){alert('max 15MB');return;}
  toast('uploading…');
  try{
    const r=await fetch(API+'/exercises/'+encodeURIComponent(ST.exKey)+'/media',{method:'POST',headers:{'Content-Type':f.type,'Authorization':'Bearer '+syncToken()},body:f});
    if(r.ok){ const d=await r.json(); stExByKey(ST.exKey).media_url=d.media_url; toast('media saved'); renderStudio(); }
    else toast('upload failed');
  }catch(_){ toast('offline'); } };
window.stGiphy=async()=>{ const url=prompt('paste a Giphy link (e.g. https://giphy.com/gifs/…)'); if(!url||!url.trim())return;
  try{
    const r=await fetch(API+'/exercises/'+encodeURIComponent(ST.exKey)+'/media-url',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},body:JSON.stringify({url:url.trim()})});
    if(r.ok){ const d=await r.json(); stExByKey(ST.exKey).media_url=d.media_url; toast('media saved'); renderStudio(); }
    else { const e=await r.json().catch(()=>({})); toast(e.error||'could not set link'); }
  }catch(_){ toast('offline'); } };
window.stRetire=async()=>{ if(!confirm('retire this exercise? it disappears from the catalog (old programs keep working)'))return;
  try{
    const r=await fetch(API+'/exercises/'+encodeURIComponent(ST.exKey),{method:'DELETE',headers:{'Authorization':'Bearer '+syncToken()}});
    if(!r.ok){ toast('failed'); return; }
    ST.my=ST.my.filter(e=>e.original_name!==ST.exKey);
    CAT.exercises=CAT.exercises.filter(e=>e.original_name!==ST.exKey); delete EXBY[ST.exKey];
    toast('retired'); stGo('exercises');
  }catch(_){ toast('offline'); } };

/* studio: programs */
function stProgramsHTML(){
  if(ST.progs===null){ stLoadProgs().then(renderStudio); return '<div class="empty">loading…</div>'; }
  let h=`<div class="st-head"><h2>my programs</h2><span class="meta">${ST.progs.length}</span>
    <span class="st-btn" style="margin-left:auto" onclick="stNewProg()">+ new program</span></div><div class="st-list">`;
  if(!ST.progs.length) h+='<div class="empty">no programs yet</div>';
  for(const p of ST.progs){
    h+=`<div class="st-row" onclick="stEditProg('${p.public_id}')">
      <span class="nm">${esc(p.name)}</span>
      <span class="mut">${p.exercises} ex · ${p.series} series</span>
      <span class="goal" style="${p.published?'color:var(--red-ink)':''}">${p.published?(p.price_cents?'$'+(p.price_cents/100).toFixed(2):'published'):'draft'}</span>
      <span class="st-actions" onclick="event.stopPropagation()">
        <span class="st-btn" onclick="stRenameProg('${p.public_id}')">rename</span>
        ${p.published?`<span class="st-btn" onclick="shareProgram('${p.public_id}')">link</span>`:''}
        <span class="st-btn" onclick="stPublish('${p.public_id}')">${p.published?'unpublish':'publish'}</span>
        <span class="st-btn" onclick="stPrice('${p.public_id}')">price</span>
        <span class="st-btn danger" onclick="stArchive('${p.public_id}')">archive</span>
      </span></div>`;
  }
  return h+'</div>';
}
window.stRenameProg=async pid=>{
  const p=(ST.progs||[]).find(x=>x.public_id===pid);
  const cur=p?p.name:(ST.doc&&ST.doc.pid===pid?ST.doc.name:'');
  const raw=prompt('program name',cur); if(!raw||!raw.trim()||raw.trim()===cur)return;
  const name=raw.trim();
  try{
    const r=await fetch(API+'/programs/'+pid,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},body:JSON.stringify({name})});
    if(r.ok){ if(p)p.name=name; if(ST.doc&&ST.doc.pid===pid)ST.doc.name=name; toast('renamed'); renderStudio(); }
    else toast('rename failed');
  }catch(_){ toast('offline'); } };
window.stNewProg=async()=>{
  const name=prompt('program name'); if(!name||!name.trim())return;
  try{
    const r=await fetch(API+'/programs',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},body:JSON.stringify({name:name.trim()})});
    if(!r.ok){toast('failed');return;}
    ST.progs=null; const p=await r.json(); toast('created'); stEditProg(p.public_id);
  }catch(_){ toast('offline'); }
};
window.stPublish=async pid=>{ const p=ST.progs.find(x=>x.public_id===pid);
  try{
    const r=await fetch(API+'/programs/'+pid,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},body:JSON.stringify({published:!p.published})});
    if(r.ok){ ST.progs=null; PUBLIST=null; toast(p.published?'unpublished':'published'); renderStudio(); }
  }catch(_){ toast('offline'); } };
window.stPrice=async pid=>{ const v=prompt('price in USD (0 = free)','0'); if(v===null)return;
  const cents=Math.round(parseFloat(v||'0')*100)||0;
  try{
    const r=await fetch(API+'/programs/'+pid,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},body:JSON.stringify({price_cents:cents})});
    if(r.ok){ ST.progs=null; PUBLIST=null; toast(cents?'$'+(cents/100).toFixed(2):'free'); renderStudio(); }
  }catch(_){ toast('offline'); } };
window.stArchive=async pid=>{ if(!confirm('archive this program?'))return;
  try{
    const r=await fetch(API+'/programs/'+pid,{method:'DELETE',headers:{'Authorization':'Bearer '+syncToken()}});
    if(r.ok){ ST.progs=null; toast('archived'); renderStudio(); }
  }catch(_){ toast('offline'); } };
window.shareProgram=pid=>{
  const url='https://duro.fit/p/'+pid;
  (navigator.clipboard?navigator.clipboard.writeText(url):Promise.reject()).then(()=>toast('link copied')).catch(()=>prompt('share this link:',url));
};

/* studio: program editor (two panes, own document) */
window.stEditProg=async pid=>{
  if(ST.my===null) await stLoadMine();
  try{
    const r=await fetch(API+'/programs/'+pid,{headers:{'Authorization':'Bearer '+syncToken()}});
    if(!r.ok){toast('failed');return;}
    const d=await r.json();
    ST.doc={pid, name:d.name, entries:(d.content&&d.content.entries)||[], series:(d.content&&d.content.series)||[]};
    ST.dirty=false; ST.target='entries'; ST.view='pedit'; renderStudio();
  }catch(_){ toast('offline'); }
};
function stPeditHTML(){
  const d=ST.doc; if(!d){ST.view='programs';return stProgramsHTML();}
  const t=ST.pq.trim().toLowerCase();
  const inDoc=new Set([...d.entries.map(e=>e.id),...d.series.flatMap(s=>s.exIds)]);
  const avail=(ST.my||[]).filter(e=>(!t||e.suggested_name.toLowerCase().includes(t))&&stFilterFit(e)).sort((a,b)=>a.suggested_name.localeCompare(b.suggested_name));
  let L=`<div class="st-head"><h2 style="font-size:16px">my exercises</h2>
    <input class="st-search" id="stpq" placeholder="search…" value="${esc(ST.pq)}" style="margin-left:auto">${stFilterSel()}</div>
    <div class="st-list">`;
  for(const e of avail){ const k=e.original_name;
    L+=`<div class="st-row" data-add="${esc(k)}" onclick="stAdd('${esc(k)}')" data-ctx="${esc(k)}" oncontextmenu="openCtxEv(event,'${esc(k)}')">${stThumb(k)}<span class="nm" style="${inDoc.has(k)?'color:var(--ink-3)':''}">${esc(e.suggested_name)}</span>${tagDots(k)}
      <span class="mut">${inDoc.has(k)?'in program':''}</span><button class="st-mini">+</button></div>`;
  }
  L+='</div>';
  const tgt=ST.target==='entries'?'loose exercises':((d.series.find(s=>s.id===ST.target)||{}).name||'?');
  let R=`<div class="st-head"><h2 style="font-size:16px;cursor:pointer" title="rename" onclick="stRenameProg('${d.pid}')">${esc(d.name)}</h2>
    <span class="st-target">adding to <b onclick="stCycleTarget()">${esc(tgt)} ▾</b></span>
    <span class="st-actions" style="margin-left:auto">
      <span class="st-btn" onclick="stNewSeries()">+ series</span>
      <span class="st-btn primary" onclick="stSaveDoc()">save${ST.dirty?' *':''}</span>
      <span class="st-btn" onclick="stGo('programs')">close</span>
    </span></div><div class="st-list" id="stdoc">`;
  for(const s of d.series){
    R+=`<div class="st-serhd" data-sec="${s.id}"><span class="nm" onclick="stRenameSeries('${s.id}')">${esc(s.name)}</span>
      <span class="st-freq" onclick="stSerFreq('${s.id}')">${s.freq==='every'?'every session':s.freq+'×/cycle'}</span>
      <button class="st-mini" onclick="stDelSeries('${s.id}')">×</button></div>`;
    s.exIds.forEach((k,i)=>{
      R+=`<div class="st-doc-row" style="margin-left:14px" data-did="${esc(k)}" data-grp="st:${s.id}" data-ctx="${esc(k)}" oncontextmenu="openCtxEv(event,'${esc(k)}')"><span class="mut">${i+1}</span>${stThumb(k)}<span class="nm">${esc(stName(k))}</span>${tagDots(k)}
        <span class="dh">≡</span>
        <button class="st-mini" onclick="stRm('${s.id}',${i})">×</button></div>`;
    });
  }
  R+=`<div data-sec="entries" style="height:0"></div>`; // invisible section marker: rows after this are loose
  d.entries.forEach((en,i)=>{
    R+=`<div class="st-doc-row" data-did="${esc(en.id)}" data-grp="st:entries" data-ctx="${esc(en.id)}" oncontextmenu="openCtxEv(event,'${esc(en.id)}')"><span class="mut">${i+1}</span>${stThumb(en.id)}<span class="nm">${esc(stName(en.id))}</span>${tagDots(en.id)}
      <span class="st-freq" onclick="stEntryFreq(${i})">${en.freq==='every'?'every session':en.freq+'×/cycle'}</span>
      <span class="dh">≡</span>
      <button class="st-mini" onclick="stRm(null,${i})">×</button></div>`;
  });
  if(!d.series.length&&!d.entries.length) R+='<div class="empty">empty — add exercises from the left</div>';
  R+='</div>';
  return `<div class="st-panes"><div class="st-pane">${L}</div><div class="st-pane">${R}</div></div>`;
}
window.stCycleTarget=()=>{ const d=ST.doc; const opts=['entries',...d.series.map(s=>s.id)];
  ST.target=opts[(opts.indexOf(ST.target)+1)%opts.length]; renderStudio(); };
window.stAdd=k=>{ const d=ST.doc;
  if(ST.target==='entries'){ if(!d.entries.some(e=>e.id===k)) d.entries.push({id:k,freq:1}); }
  else { const s=d.series.find(x=>x.id===ST.target); if(s&&!s.exIds.includes(k)) s.exIds.push(k); }
  ST.dirty=true; renderStudio(); };
window.stRm=(sid,i)=>{ const d=ST.doc; if(sid){ d.series.find(s=>s.id===sid).exIds.splice(i,1); } else d.entries.splice(i,1); ST.dirty=true; renderStudio(); };
window.stNewSeries=()=>{ const n=prompt('series name','warm-up'); if(!n)return;
  const id=uid();
  ST.doc.series.push({id,name:n.trim(),exIds:[],freq:'every'}); ST.target=id; ST.dirty=true; renderStudio(); };
window.stRenameSeries=sid=>{ const s=ST.doc.series.find(x=>x.id===sid); const n=prompt('series name',s.name); if(n){s.name=n.trim()||s.name;ST.dirty=true;renderStudio();} };
window.stDelSeries=sid=>{ if(!confirm('delete series?'))return; ST.doc.series=ST.doc.series.filter(s=>s.id!==sid); if(ST.target===sid)ST.target='entries'; ST.dirty=true; renderStudio(); };
window.stSerFreq=sid=>{ const s=ST.doc.series.find(x=>x.id===sid); s.freq=FREQS[(FREQS.indexOf(s.freq)+1)%FREQS.length]; ST.dirty=true; renderStudio(); };
window.stEntryFreq=i=>{ const en=ST.doc.entries[i]; en.freq=FREQS[(FREQS.indexOf(en.freq)+1)%FREQS.length]; ST.dirty=true; renderStudio(); };
window.stSaveDoc=async()=>{ const d=ST.doc;
  try{
    const r=await fetch(API+'/programs/'+d.pid,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+syncToken()},
      body:JSON.stringify({content:{entries:d.entries,series:d.series}})});
    if(r.ok){ ST.dirty=false; ST.progs=null; toast('program saved'); renderStudio(); } else toast('save failed');
  }catch(_){ toast('offline'); } };

/* ---------- master render ---------- */
function render(){
  if(!authed()) return renderAuth();
  if(UI.screen==='trainer'){ if(!canAuthor()){ UI.screen='program'; } else return renderStudio(); }
  document.body.classList.remove('studio');
  if(UI.screen==='session') renderSession();
  else if(UI.screen==='complete') renderComplete();
  else if(UI.screen==='focus') return renderFocus();
  else if(UI.screen==='exdetail') renderExDetail();
  else if(UI.screen==='programs') renderPrograms();
  else if(UI.screen==='find') renderFind();
  else if(UI.screen==='progpage') renderProgPage();
  else renderProgram();
  const em=localStorage.getItem('duro_email')||'?';
  $.insertAdjacentHTML('beforeend',`<div class="avatar" onclick="accountMenu()" title="${esc(em)}">${esc(em[0].toUpperCase())}</div>`);
}

/* ---------- boot ---------- */
Promise.all([
  fetch('./docs/muscle-region-map.json').then(r=>r.json()),
  fetch('./media/manifest.json').then(r=>r.json()).catch(()=>[])
]).then(async([map,mediaList])=>{
  loadLocal();
  map.muscles.forEach(m=>{ M2R[m.scientific]=m.regions; COMMON[m.scientific]=m.common; m.regions.forEach(r=>{(REGMUS[r]=REGMUS[r]||[]).push(m);}); });
  (mediaList||[]).forEach(f=>{ MEDIA[f.replace(/\.[^.]+$/,'')]=f; });
  if(authed()){
    await loadExercises();
    await loadActiveProgram();   // pull the trainer's latest on every open
    seedSession();
    if(PENDH.startsWith('#p/')) applyPath('/p/'+PENDH.slice(3));
    else applyPath(PENDPATH);
  }
  render();
  pullState();
}).catch(e=>{ $.innerHTML='<div class="empty">failed to load — '+esc(String(e))+'</div>'; });
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
